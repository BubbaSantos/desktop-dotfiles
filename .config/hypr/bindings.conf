# Application bindings
$terminal = uwsm-app -- alacritty
$browser = omarchy-launch-browser
$webapp = chromium --app

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"


# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

debug {
    disable_logs = false
}

#unbinds
unbind = SUPER, A
unbind = SUPER, W
unbind = SUPER, F
unbind = SUPER, J
unbind = SUPER, P
unbind = SUPER, O
unbind = SUPER CTRL, F
unbind = SUPER ALT, F
unbind = SUPER, TAB
unbind = SUPER CTRL, TAB
unbind = SUPER CTRL, W
unbind = , PRINT
unbind = SHIFT, PRINT
unbind = SUPER, T
unbind = SUPER CTRL, T
unbind = SUPER CTRL, B
unbind = SUPER, Y
unbind = SUPER, K
unbind = SUPER, \
unbind = SUPER, Z
unbind = SUPER, S
unbind = SUPER SHIFT CTRL, Space
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up
unbind = ALT, TAB

#Apps
bindd = SUPER, A, Claude, exec, $webapp="https://claude.ai/new"
#bindd = SUPER, A, Claude, exec, firefoxpwa site launch 01KGTPV4ESC2A2XSRJF1QYEC7D
bind = SUPER, B, exec, vivaldi --ozone-platform=wayland --enable-features=TouchpadOverscrollHistoryNavigation,UseOzonePlatform,WaylandWindowDecorations --force-device-scale-factor=1
#bind = SUPER, B, exec, zen-browser
bindd = SUPER, Z, ChatGPT, exec, $webapp="https://chatgpt.com"
bind = SUPER SHIFT, G, togglefloating, class:^(chrome-chatgpt.com__-Profile_1)$
#bindd = SUPER, L, Editor, exec, omarchy-launch-editor
bind = SUPER, L, exec, localsend
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bind = SUPER, N, exec, ~/.config/hypr/scripts/toggle-notion.sh
bind = SUPER SHIFT, N, exec, xpad
bind = SUPER, O, exec, ~/.config/hypr/scripts/toggle-outlook.sh
bind = SUPER, M, exec, ~/.config/hypr/scripts/toggle-ytmusic.sh
bind = SUPER, F, exec, ~/.config/hypr/scripts/toggle-fotmob.sh
bind = SUPER, R, exec, ~/.config/hypr/scripts/toggle-reddit.sh
bind = SUPER SHIFT, R, exec, ~/.config/hypr/scripts/toggle-remmina.sh
bind = SUPER, S, exec, steam
bind = SUPER SHIFT, S, exec, gnome-sound-recorder
bind = SUPER, T, exec, ~/.config/hypr/scripts/toggle-teams-linux.sh
bind = SUPER, P, exec, ~/.config/hypr/scripts/midas-log
bind = SUPER SHIFT, P, exec, ~/.config/hypr/scripts/patreon-toggle
bind = SUPER, Y, exec, ~/.config/hypr/scripts/youtube-toggle
bind = SUPER, K, exec, ~/.config/hypr/scripts/keybr-toggle.sh
bind = SUPER, W, exec, ~/.config/hypr/scripts/whatsapp-toggle.sh
bind = SUPER, J, exec, ~/.config/hypr/scripts/toggle-jellyfin.sh
bindd = SUPER, U, To Do, exec, $webapp="https://to-do.office.com/tasks/inbox"
#bind = SUPER, X, exec, ~/.config/hypr/scripts/toggle-x.sh

#floating apps
bindd = SUPER SHIFT, Z, ChatGPT (Floating), exec, chromium --app="https://chatgpt.com" && sleep 0.3 && hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 600 1200 && hyprctl dispatch centerwindow
bindd = SUPER SHIFT, A, Claude (Floating), exec, firefoxpwa site launch 01KGTPV4ESC2A2XSRJF1QYEC7D && sleep 0.3 && hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 600 1200 && hyprctl dispatch centerwindow
bindd = SUPER SHIFT, RETURN, Floating Terminal, exec, alacritty --class floating-terminal

bind = SUPER_CTRL, W, exec, ~/.config/waybar/refresh-bars.sh
bind = SUPER CTRL, C, exec, $terminal -e /home/bubba/.local/bin/edit-hypr-config
bind = SUPER SHIFT, C, exec, $terminal -e /home/bubba/.local/bin/edit-hypr-defaults
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings
#bind = SUPER SHIFT, W, exec, ~/.local/bin/workflow-work
bind = SUPER, period, exec, ~/.local/bin/emoji-picker
bind = SUPER, slash, exec, ~/.local/bin/snippet-picker
bind = SUPER, D, exec, ~/.config/hypr/scripts/toggle_dwindle.sh
bind = ALT, X, exec, ~/.config/hypr/scripts/google-search-selected.sh
bind = , XF86Tools, exec, ~/.config/hypr/scripts/toggle-calculator.sh
#bind = SUPER SHIFT CTRL, Space, exec, ~/.local/bin/wallpaper-picker

# Control tiling
bind = SUPER, Q, killactive,
bindd = SUPER CTRL, J, Toggle window split, togglesplit, # dwindle
bindd = SUPER CTRL, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bind = SUPER_CTRL, left, workspace, -1
bind = SUPER_CTRL, right, workspace, +1
#bindd = SUPER CTRL, T, Toggle window floating/tiling, togglefloating,
bind = SUPER , backslash, exec, ~/.config/hypr/scripts/float-size.sh
bind = SUPER, numbersign, exec, ~/.config/hypr/scripts/toggle_float_tile.sh
bind = SUPER, I, exec, ~/.config/hypr/scripts/toggle-pin.sh
bind = SUPER SHIFT, O, exec, ~/.config/hypr/scripts/toggle-opacity.sh
bind = SUPER, Page_Up, exec, espanso restart
bindd = ALT, TAB, Next window in group, changegroupactive, f

group {
  drag_into_group = 0
}


#MOnitor Brightness
binde = SUPER, F1, exec, sh -c "BRIGHTNESS_STEP=10 $HOME/.local/bin/monitor-brightness down & disown"
binde = SUPER, F2, exec, sh -c "BRIGHTNESS_STEP=10 $HOME/.local/bin/monitor-brightness up & disown"
bind = SUPER SHIFT, F1, exec, sh -c "$HOME/.local/bin/monitor-brightness min & disown"
bind = SUPER SHIFT, F2, exec, sh -c "$HOME/.local/bin/monitor-brightness max & disown"

#Logitech Brio Control
# Pan with arrow keys
bind = SUPER ALT, C, exec, /usr/bin/cheese
binde = SUPER ALT, Right, exec, ~/.local/bin/brio-cam.sh pan_left
binde = SUPER ALT, Left, exec, ~/.local/bin/brio-cam.sh pan_right
binde = SUPER ALT, Down, exec, ~/.local/bin/brio-cam.sh pan_up
binde = SUPER ALT, Up, exec, ~/.local/bin/brio-cam.sh pan_down

# Zoom with Page Up / Page Down
binde = SUPER ALT, Page_Up, exec, ~/.local/bin/brio-cam.sh zoom_in
binde = SUPER ALT, Page_Down, exec, ~/.local/bin/brio-cam.sh zoom_out

#Autofocus
bind = SUPER ALT, F, exec, ~/.local/bin/brio-cam.sh autofocus_toggle
binde = SUPER ALT, Home, exec, ~/.local/bin/brio-cam.sh focus_far
binde = SUPER ALT, End, exec, ~/.local/bin/brio-cam.sh focus_near

# Middle-click drag to move windows
bindm = , mouse:274, movewindow

workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3
workspace = 10, monitor:DP-3
workspace = 11, monitor:HDMI-A-1
workspace = 12, monitor:HDMI-A-1
workspace = 13, monitor:HDMI-A-1
workspace = 14, monitor:HDMI-A-1
workspace = 15, monitor:HDMI-A-1
workspace = 16, monitor:HDMI-A-1
workspace = 17, monitor:HDMI-A-1
workspace = 18, monitor:HDMI-A-1
workspace = 19, monitor:HDMI-A-1
workspace = 20, monitor:HDMI-A-1

# Special workspace toggles
bind = ALT, 1, togglespecialworkspace, special 1
bind = ALT, 2, togglespecialworkspace, special 2
bind = ALT, 3, togglespecialworkspace, special 3
bind = ALT, 4, togglespecialworkspace, special 4
bind = ALT, 5, togglespecialworkspace, special 5
bind = ALT, 6, togglespecialworkspace, special 6
bind = ALT, 7, togglespecialworkspace, special 7
bind = ALT, 8, togglespecialworkspace, special 8
bind = ALT, 9, togglespecialworkspace, special 9

# Special workspace moves
bind = ALT SHIFT, 1, movetoworkspacesilent, special:special 1
bind = ALT SHIFT, 2, movetoworkspacesilent, special:special 2
bind = ALT SHIFT, 3, movetoworkspacesilent, special:special 3
bind = ALT SHIFT, 4, movetoworkspacesilent, special:special 4
bind = ALT SHIFT, 5, movetoworkspacesilent, special:special 5
bind = ALT SHIFT, 6, movetoworkspacesilent, special:special 6
bind = ALT SHIFT, 7, movetoworkspacesilent, special:special 7
bind = ALT SHIFT, 8, movetoworkspacesilent, special:special 8
bind = ALT SHIFT, 9, movetoworkspacesilent, special:special 9

#Switch workspaces on side monitor (HDMI-A-1):
bindd = SUPER CTRL, code:10, Switch to workspace 1 (side), workspace, 11
bindd = SUPER CTRL, code:11, Switch to workspace 2 (side), workspace, 12
bindd = SUPER CTRL, code:12, Switch to workspace 3 (side), workspace, 13
bindd = SUPER CTRL, code:13, Switch to workspace 4 (side), workspace, 14
bindd = SUPER CTRL, code:14, Switch to workspace 5 (side), workspace, 15
bindd = SUPER CTRL, code:15, Switch to workspace 6 (side), workspace, 16
bindd = SUPER CTRL, code:16, Switch to workspace 7 (side), workspace, 17
bindd = SUPER CTRL, code:17, Switch to workspace 8 (side), workspace, 18
bindd = SUPER CTRL, code:18, Switch to workspace 9 (side), workspace, 19
bindd = SUPER CTRL, code:19, Switch to workspace 10 (side), workspace, 20

bindd = SUPER CTRL SHIFT, code:10, Move window to workspace 1 (side), movetoworkspace, 11
bindd = SUPER CTRL SHIFT, code:11, Move window to workspace 2 (side), movetoworkspace, 12
bindd = SUPER CTRL SHIFT, code:12, Move window to workspace 3 (side), movetoworkspace, 13
bindd = SUPER CTRL SHIFT, code:13, Move window to workspace 4 (side), movetoworkspace, 14
bindd = SUPER CTRL SHIFT, code:14, Move window to workspace 5 (side), movetoworkspace, 15
bindd = SUPER CTRL SHIFT, code:15, Move window to workspace 6 (side), movetoworkspace, 16
bindd = SUPER CTRL SHIFT, code:16, Move window to workspace 7 (side), movetoworkspace, 17
bindd = SUPER CTRL SHIFT, code:17, Move window to workspace 8 (side), movetoworkspace, 18
bindd = SUPER CTRL SHIFT, code:18, Move window to workspace 9 (side), movetoworkspace, 19
bindd = SUPER CTRL SHIFT, code:19, Move window to workspace 10 (side), movetoworkspace, 20

bindd = SUPER CTRL SHIFT ALT, code:10, Move window silently to workspace 1 (side), movetoworkspacesilent, 11
bindd = SUPER CTRL SHIFT ALT, code:11, Move window silently to workspace 2 (side), movetoworkspacesilent, 12
bindd = SUPER CTRL SHIFT ALT, code:12, Move window silently to workspace 3 (side), movetoworkspacesilent, 13
bindd = SUPER CTRL SHIFT ALT, code:13, Move window silently to workspace 4 (side), movetoworkspacesilent, 14
bindd = SUPER CTRL SHIFT ALT, code:14, Move window silently to workspace 5 (side), movetoworkspacesilent, 15
bindd = SUPER CTRL SHIFT ALT, code:15, Move window silently to workspace 6 (side), movetoworkspacesilent, 16
bindd = SUPER CTRL SHIFT ALT, code:16, Move window silently to workspace 7 (side), movetoworkspacesilent, 17
bindd = SUPER CTRL SHIFT ALT, code:17, Move window silently to workspace 8 (side), movetoworkspacesilent, 18
bindd = SUPER CTRL SHIFT ALT, code:18, Move window silently to workspace 9 (side), movetoworkspacesilent, 19
bindd = SUPER CTRL SHIFT ALT, code:19, Move window silently to workspace 10 (side), movetoworkspacesilent, 20

# TAB between workspaces
bindd = SUPER CTRL, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER, TAB, Former workspace, workspace, previous
bind = SUPER, Delete, exec, ~/.config/hypr/scripts/close_other_workspaces.sh

#Screen Capture
bind = , Print, exec, bash -c 'FILE=~/Pictures/Screenshots/fullscreen-$(date +%s).png; grim -o $(hyprctl monitors -j | jq -r ".[] | select(.focused == true) | .name") - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open in satty" "Screenshot" "Fullscreen saved + copied" --wait); [ "$ACTION" = "default" ] && satty -f "$FILE"'
bind = CTRL, Print, exec, bash -c 'FILE=~/Pictures/Screenshots/window-$(date +%s).png; AT=$(hyprctl activewindow | grep "at:" | awk "{print \$2}") && SIZE=$(hyprctl activewindow | grep "size:" | awk "{print \$2}" | sed "s/,/x/") && grim -g "${AT} ${SIZE}" - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open in satty" "Screenshot" "Window saved + copied" --wait); [ "$ACTION" = "default" ] && satty -f "$FILE"'
bind = SHIFT, Print, exec, bash -c 'FILE=~/Pictures/Screenshots/region-$(date +%s).png; grim -g "$(slurp)" - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open in satty" "Screenshot" "Region saved + copied" --wait); [ "$ACTION" = "default" ] && satty -f "$FILE"'
# Region screenshot → Google Lens
bind = SUPER SHIFT, Print, exec, ~/.local/bin/region-to-lens


# Lid switch handling - prevent screen blink on lid open
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

#Audio
#bind = CTRL ALT, S, exec, ~/.config/hypr/scripts/audio-speakers.sh
#bind = CTRL ALT, H, exec, ~/.config/hypr/scripts/audio-headset.sh

#Sleep
bind = SUPER SHIFT, Delete, exec, sleep 0.3 && hyprctl dispatch dpms off

# Backtick Copy/Paste
bind = , grave, exec, ~/.config/hypr/scripts/backtick_handler.sh
bind = CTRL, grave, exec, wtype -M ctrl -P v -p v -m ctrl
bind = SHIFT, grave, exec, ~/.config/hypr/scripts/clipse-launch.sh
bind = SUPER CTRL, V, exec, ~/.config/hypr/scripts/clipse-launch.sh
bind = SUPER, grave, exec, ~/.local/bin/type-clipboard.sh



# Make window float at specific size
bind = SUPER SHIFT, T, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 1214 1246 && hyprctl dispatch centerwindow

#Dictation
bind = SUPER SHIFT, semicolon, exec, ~/whisper-toggle.sh


# hyprwhspr - Toggle mode (added by hyprwhspr setup)
# Press once to start, press again to stop
bindd = SUPER SHIFT, backslash, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record

bind = SUPER SHIFT, W, exec, /home/bubba/.local/bin/select-wallpaper
bind = SUPER ALT, W, exec, /home/bubba/.local/bin/random-wallpaper

#bind = CTRL, Tab, exec, ~/.config/hypr/scripts/vivaldi-tab-switch.sh

